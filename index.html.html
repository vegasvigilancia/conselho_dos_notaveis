  (function () {
    var blocked = 'in-browser Babel transformer';
    ['log', 'warn', 'info', 'error', 'debug'].forEach(function (m) {
      var orig = console[m] ? console[m].bind(console) : function () {};
      console[m] = function () {
        for (var i = 0; i < arguments.length; i++) {
          if (typeof arguments[i] === 'string' && arguments[i].indexOf(blocked) !== -1) return;

        return orig.apply(console, arguments);
      };
    });
  })();
</script>

function parseSections(text, labels) {
  if (!text) return null;
  const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const alt = labels.map(esc).join("|");
  const re = new RegExp("(" + alt + ")\\s*:?", "gi");
  const found = []; let m;
  while ((m = re.exec(text)) !== null) found.push({ raw: m[1], start: m.index, end: re.lastIndex });
  if (!found.length) return null;
  const out = {};
  for (let i = 0; i < found.length; i++) {
    const next = i + 1 < found.length ? found[i + 1].start : text.length;
    const seg = text.slice(found[i].end, next).trim();
    const key = labels.find((l) => l.toLowerCase() === found[i].raw.toLowerCase()) || found[i].raw.toUpperCase();
    if (seg) out[key] = seg;
  }
  return Object.keys(out).length ? out : null;
}

function normalizeVote(v) {
  if (!v) return "abster";
  const t = v.trim().toLowerCase();
  if (t.startsWith("aprov")) return "aprovar";
  if (t.startsWith("reprov")) return "reprovar";
  if (t.startsWith("abst")) return "abster";
  if (/reprov|contra|rejeit|veta/.test(t)) return "reprovar";
  if (/aprov|favor/.test(t)) return "aprovar";
  return "abster";
}

async function callClaudeOnce(apiKey, systemPrompt, userContent) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: MODEL, max_tokens: 1000, system: systemPrompt,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!response.ok) {
    let detail = "";
    try { const errBody = await response.json(); detail = errBody && errBody.error && errBody.error.message ? " — " + errBody.error.message : ""; } catch (e) {}
    throw new Error("HTTP " + response.status + detail);
  }
  const data = await response.json();
  if (data && data.error) throw new Error(data.error.message || "Erro da API");
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n").trim();
  if (!text) throw new Error("Resposta vazia");
  return text;
}

async function callClaude(apiKey, systemPrompt, userContent) {
  let lastErr;
  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try { return await callClaudeOnce(apiKey, systemPrompt, userContent); }
    catch (e) { lastErr = e; await sleep(800 * (attempt + 1) + Math.random() * 600); }
  }
  throw lastErr;
}

async function runInBatches(items, size, worker) {
  for (let i = 0; i < items.length; i += size) {
    const slice = items.slice(i, i + size);
    await Promise.all(slice.map(worker));
    if (i + size < items.length) await sleep(400);
  }
}

    ADVISORS.forEach((a) => { tally[(collected[a.id] && collected[a.id].vote) || "abster"]++; });
    setPresident({ status: "loading" });
    const pareceres = ADVISORS.map((a) => "### " + a.name + " (" + a.seat + ") — VOTO: " + (((collected[a.id] && collected[a.id].vote) || "abster").toUpperCase()) + "\n" + ((collected[a.id] && collected[a.id].text) || "[sem parecer]")).join("\n\n");
    const placarTxt = "PLACAR: " + tally.aprovar + " aprovam, " + tally.reprovar + " reprovam, " + tally.abster + " se abstêm.";
    const presidentInput = buildPautaBlock() + "\n\n" + placarTxt + "\n\nPARECERES DO CONSELHO:\n\n" + pareceres + "\n\n" + PRESIDENT_FORMAT;
    let ptext = ""; let pStatus = "done";
    try { ptext = await callClaude(apiKey, PRESIDENT.prompt, presidentInput); }
    catch (e) { pStatus = "error"; ptext = "Falha ao gerar a síntese da presidência."; }
    setPresident({ status: pStatus, text: ptext });
    if (pStatus === "done") {
      const record = {
        id: Date.now().toString(), createdAt: new Date().toISOString(),
        pauta: pauta.trim(), contexto: contexto.trim(), opcoes: opcoes.trim(),
        advisors: ADVISORS.map((a) => ({ id: a.id, name: a.name, seat: a.seat, initials: a.initials, text: (collected[a.id] && collected[a.id].text) || "", vote: (collected[a.id] && collected[a.id].vote) || "abster" })),
        president: ptext, placar: tally,
      };
      const newHist = [record, ...history].slice(0, 60);
      setHistory(newHist); setCurrentId(record.id); persist(newHist);
      setSavedNote("Ata salva no histórico");
    }
  };

  const convene = async () => {
    if (!pauta.trim() || running || !apiKey.trim()) return;
    setRunning(true); setConvened(true); setPresident(null); setSavedNote(""); setCurrentId(null);
    const initial = {}; ADVISORS.forEach((a) => (initial[a.id] = { status: "loading" })); setResponses(initial);
    const userContent = buildPautaBlock() + "\n\n" + ADVISOR_FORMAT;
    const collected = {};
    await runInBatches(ADVISORS, BATCH_SIZE, (a) => queryAdvisor(a, userContent, collected));
    await runPresident(collected);
    setRunning(false);
  };

  const retryFailed = async () => {
    if (running) return;
    const failed = ADVISORS.filter((a) => responses[a.id] && responses[a.id].status === "error");
    if (!failed.length) return;
    setRunning(true); setSavedNote("");
    const collected = {};
    ADVISORS.forEach((a) => { const r = responses[a.id]; if (r && r.status === "done") collected[a.id] = { text: r.text, vote: r.vote }; });
    const userContent = buildPautaBlock() + "\n\n" + ADVISOR_FORMAT;
    await runInBatches(failed, BATCH_SIZE, (a) => queryAdvisor(a, userContent, collected));
    await runPresident(collected);
    setRunning(false);
  };

  const failedCount = ADVISORS.filter((a) => responses[a.id] && responses[a.id].status === "error").length;

  const loadDeliberation = (rec) => {
    setPauta(rec.pauta || ""); setContexto(rec.contexto || ""); setOpcoes(rec.opcoes || "");
    const resp = {}; (rec.advisors || []).forEach((a) => { resp[a.id] = { status: "done", text: a.text, vote: a.vote }; });
    setResponses(resp); setPresident({ status: "done", text: rec.president });
    setConvened(true); setCurrentId(rec.id); setSavedNote(""); setView("deliberar");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  const deleteDeliberation = (id) => {
    if (!window.confirm("Excluir esta deliberação do histórico? Esta ação não pode ser desfeita.")) return;
    const arr = history.filter((h) => h.id !== id); setHistory(arr); persist(arr);
    if (currentId === id) setCurrentId(null);
  };
  const reset = () => { setPauta(""); setContexto(""); setOpcoes(""); setResponses({}); setPresident(null); setConvened(false); setCurrentId(null); setSavedNote(""); };
  const exportPDF = () => { window.print(); };
  const presidentDone = president && president.status === "done";

  return (
    <div className="cn-root">
      <div className="cn-app">
        <header className="cn-header">
          <div className="cn-rule" />
          <h1 className="cn-title">CONSELHO DOS NOTÁVEIS</h1>
          <p className="cn-subtitle">Vinte mentes da história · presidido por Jesus Cristo</p>
          <div className="cn-rule" />
        </header>

        <section className="cn-keybar">
          {!keySaved ? (
            <div className="cn-key-row">
              <input className="cn-input cn-key-input" type="password" placeholder="Cole sua chave da API Anthropic (sk-ant-...)" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
              <button className="cn-btn cn-btn-sm" onClick={saveKey} disabled={!apiKey.trim()}>Salvar chave</button>
            </div>
          ) : (
            <div className="cn-key-row">
              <span className="cn-key-ok">✓ Chave configurada neste navegador</span>
              <button className="cn-btn cn-btn-sm cn-btn-ghost" onClick={clearKey}>Trocar chave</button>
            </div>
          )}
        </section>

        <nav className="cn-nav">
          <button className={view === "deliberar" ? "cn-tab cn-tab-on" : "cn-tab"} onClick={() => setView("deliberar")}>Deliberar</button>
          <button className={view === "historico" ? "cn-tab cn-tab-on" : "cn-tab"} onClick={() => setView("historico")}>Histórico {history.length > 0 && <span className="cn-count">{history.length}</span>}</button>
        </nav>

        {view === "deliberar" && (
          <React.Fragment>
            <section className="cn-panel">
              <label className="cn-field-label">A decisão / pauta</label>
              <textarea className="cn-input" rows={2} placeholder="Ex.: Devo comprar o veículo no Paraguai sob admissão temporária Mercosul agora ou aguardar a estrutura de dupla domiciliação?" value={pauta} onChange={(e) => setPauta(e.target.value)} />
              <div className="cn-grid2">
                <div>
                  <label className="cn-field-label">Contexto (números, prazo, situação)</label>
                  <textarea className="cn-input" rows={2} placeholder="Ex.: caixa disponível, prazo, riscos legais conhecidos..." value={contexto} onChange={(e) => setContexto(e.target.value)} />
                </div>
                <div>
                  <label className="cn-field-label">Opções (se houver)</label>
                  <textarea className="cn-input" rows={2} placeholder="Ex.: A) comprar já  B) aguardar  C) financiar" value={opcoes} onChange={(e) => setOpcoes(e.target.value)} />
                </div>
              </div>
              <div className="cn-actions">
                <button className="cn-btn" onClick={convene} disabled={running || !pauta.trim() || !apiKey.trim()}>{running ? "Conselho deliberando…" : "Convocar o Conselho"}</button>
                {convened && !running && <button className="cn-btn cn-btn-ghost" onClick={reset}>Nova pauta</button>}
                {!running && failedCount > 0 && <button className="cn-btn cn-btn-ghost" onClick={retryFailed}>Reconvocar os que falharam ({failedCount})</button>}
                {presidentDone && !running && <button className="cn-btn cn-btn-ghost" onClick={exportPDF}>Exportar ata (PDF)</button>}
                {savedNote && <span className="cn-saved">✓ {savedNote}</span>}
                {!apiKey.trim() && <span className="cn-warn">Configure a chave da API acima para convocar.</span>}
              </div>
            </section>

            {convened && (
              <React.Fragment>
                {(presidentDone || Object.values(responses).some((r) => r.status === "done")) && <Scoreboard placar={placar} />}
                <div className="cn-section-title"><span>OS VINTE CONSELHEIROS</span></div>
                <div className="cn-council">
                  {ADVISORS.map((a) => {
                    const r = responses[a.id] || { status: "idle" };
                    const parsed = r.status === "done" ? parseSections(r.text, ADVISOR_LABELS) : null;
                    return (
                      <article key={a.id} className={"cn-card " + (r.status === "done" ? "cn-card-done" : "")}>
                        <div className="cn-card-head">
                          <Medallion initials={a.initials} />
                          <div className="cn-card-id"><h3>{a.name}</h3><span className="cn-seat">{a.seat}</span></div>
                          {r.status === "done" && <VoteBadge vote={r.vote} />}
                        </div>
                        <div className="cn-card-body">
                          {r.status === "loading" && <Shimmer />}
                          {r.status === "error" && <p className="cn-error">{r.text}</p>}
                          {r.status === "done" && <Sections data={parsed} raw={r.text} labels={ADVISOR_DISPLAY} />}
                        </div>
                      </article>
                    );
                  })}
                </div>
                {president && (
                  <div className="cn-president">
                    <div className="cn-president-head">
                      <CrossMedallion />
                      <div>
                        <span className="cn-pres-tag">PRESIDENTE DO CONSELHO</span>
                        <h2>{PRESIDENT.name}</h2>
                        <span className="cn-seat cn-seat-light">Discernimento e síntese final</span>
                      </div>
                    </div>
                    <div className="cn-president-body">
                      {president.status === "loading" && <p className="cn-deliberating">Ouvindo o conselho e ponderando…</p>}
                      {president.status === "error" && <p className="cn-error">{president.text}</p>}
                      {president.status === "done" && <Sections data={parseSections(president.text, PRESIDENT_LABELS)} raw={president.text} labels={PRESIDENT_LABELS} />}
                    </div>
                  </div>
                )}
              </React.Fragment>
            )}
          </React.Fragment>
        )}

        {view === "historico" && (
          <section className="cn-history">
            {history.length === 0 && <p className="cn-empty">Nenhuma deliberação salva ainda. Convoque o conselho para começar.</p>}
            {history.map((h) => (
              <article key={h.id} className="cn-hist-item">
                <div className="cn-hist-main"><p className="cn-hist-pauta">{h.pauta}</p><span className="cn-hist-date">{new Date(h.createdAt).toLocaleString("pt-BR")}</span></div>
                <div className="cn-hist-placar">
                  <span style={{ color: VOTE_META.aprovar.color }}>▲ {h.placar.aprovar}</span>
                  <span style={{ color: VOTE_META.reprovar.color }}>▼ {h.placar.reprovar}</span>
                  <span style={{ color: VOTE_META.abster.color }}>— {h.placar.abster}</span>
                </div>
                <div className="cn-hist-btns">
                  <button className="cn-btn cn-btn-sm" onClick={() => loadDeliberation(h)}>Abrir</button>
                  <button className="cn-btn cn-btn-sm cn-btn-danger" onClick={() => deleteDeliberation(h.id)}>Excluir</button>
                </div>
              </article>
            ))}
          </section>
        )}

        <footer className="cn-footer">Conselho consultivo · agentes de IA · uso pessoal de Juliano</footer>
      </div>

      {presidentDone && (
        <div id="cn-print-area">
          <h1>ATA DE DELIBERAÇÃO</h1>
          <h2 className="p-sub">Conselho dos Notáveis · Presidência: Jesus Cristo</h2>
          <p className="p-date">{new Date().toLocaleString("pt-BR")}</p>
          <hr />
          <h3>Pauta</h3><p>{pauta}</p>
          {contexto && <React.Fragment><h3>Contexto</h3><p>{contexto}</p></React.Fragment>}
          {opcoes && <React.Fragment><h3>Opções</h3><p>{opcoes}</p></React.Fragment>}
          <h3>Placar do Conselho</h3>
          <p><strong>Aprovar:</strong> {placar.aprovar} · <strong>Reprovar:</strong> {placar.reprovar} · <strong>Abster:</strong> {placar.abster}</p>
          <hr /><h3>Pareceres dos Conselheiros</h3>
          {ADVISORS.map((a) => { const r = responses[a.id]; if (!r || r.status !== "done") return null;
            return <div className="p-advisor" key={a.id}><h4>{a.name} — {a.seat} <span className="p-vote">[{(r.vote || "abster").toUpperCase()}]</span></h4><p className="p-text">{r.text}</p></div>; })}
          <hr /><h3>Síntese da Presidência — Jesus Cristo</h3><p className="p-text">{president.text}</p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
